name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system libraries
        # libfuzzy-dev: build ssdeep; libmagic1: runtime for python-magic
        run: sudo apt-get update && sudo apt-get install -y libfuzzy-dev libmagic1

      - name: Install Python dependencies
        # ssdeep's setup.py imports pkg_resources, which setuptools >= 81 no
        # longer ships; pip's isolated build env uses a recent setuptools, so
        # the build fails. Pre-install setuptools < 81 + wheel and build without
        # isolation so the sdist-only packages (ssdeep, python-tlsh) use them.
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<81" wheel
          pip install --no-build-isolation -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -v tests/
